<!DOCTYPE html>
<html lang="en" xmlns="http://www.thymeleaf.org" th:replace="base::layout(~{::section})">
    <head>
        <title>Home Page</title>
    </head>

    <body>
        <section>
            <div class="container mycontainer">
                <div class="row myrow">
                    <div class="col-md-7 col-sm-6"><h1 style="font-size: 110px; color: #198754; padding-top: 20px;">Manage all your contacts easily in one place.</h1></div>
                    <div class="col-md-1 col-sm-0"></div>
                    <div class="col-md-4 col-sm-6">
                        <form class="signupform rounded" th:action="@{/processsignup}" method="post"><br>
                            <h3 style="color: white;">Don't have an account yet? Create one right here!</h3><br><br>
                            <div th:if="${session.message}" th:classappend="${session.message.type}" class="alert" role="alert">
                                <p class="text-center" th:text="${session.message.content}"> <p>
                                <th:block th:text="${#session.removeAttribute('message')}"></th:block>
                            </div>
                            <div class="mb-3">
                                <input type="name" name="name" class="form-control" id="exampleInputEmail1" placeholder="Name" aria-describedby="emailHelp">
                            </div>
                            <div class="mb-3">
                              <input type="email" name="email" class="form-control" id="exampleInputEmail1" placeholder="Email" aria-describedby="emailHelp">
                            </div>
                            <div class="mb-3">
                              <input type="password" name="password" placeholder="Password" class="form-control" id="exampleInputPassword1">
                            </div>
                            <div class="mb-3">
                                <input type="password" name="confirmpassword" placeholder="Confirm Password" class="form-control" id="exampleInputPassword1">
                            </div>
                            <br>
                            <div class="mb-3 form-check">
                              <input type="checkbox" class="form-check-input" id="exampleCheck1">
                              <label class="form-check-label" for="exampleCheck1" style="color: white;">I agree with all the terms and conditions.</label>
                            </div>
                            <br>
                            <button type="submit" class="btn btn-outline-light">Create an account</button>
                          </form>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
