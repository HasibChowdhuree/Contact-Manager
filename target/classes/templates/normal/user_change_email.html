<!DOCTYPE html>
<html lang="en" xmlns="http://www.thymeleaf.org" th:replace="normal/user_base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <section class="d-flex justify-content-center align-items-center">
        <div class="col-md-4 col-sm-10 col-10" style="margin-top: 80px; margin-bottom: 80px;">
            <form class="signupform rounded" th:action="@{/user/process-change-email}" method="post"><br>
                <h3 style="color: white; text-align: center;">Change Email</h3><br><br>
                <div th:if="${session.message}" th:classappend="${session.message.type}" class="alert" role="alert">
                    <p class="text-center" th:text="${session.message.content}"> <p>
                    <th:block th:text="${#session.removeAttribute('message')}"></th:block>
                </div>
                <div class="mb-3">
                    <input type="email" name="email" placeholder="New Email" class="form-control" id="">
                </div>
                <br>
                <div class="text-center">
                    <button type="submit" class="btn btn-outline-light">Change Email</button>
                    <br>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
