<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <title th:text="${title}">Hello, base!</title>
  </head>
  <body>
    <!-- Navbar-->
    <nav class="navbar navbar-expand-lg sticky-top navbar-dark bg-dark" style="padding-left: 20px; padding-right: 10px;">
        <div class="container-fluid">
          <a class="navbar-brand" href="#"><h2 style="color: #198754;">Contact Manager</h2></a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            Login
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <form class="d-flex" id="login-form" th:action="@{/}" method="post">
                <div th:if="${param.error}" class="alert alert-danger form-control me-2" style="padding: 5px; margin: 0px; text-align: center;">Invalid email or password</div>
    				<div th:if="${param.logout}" class="alert alert-success form-control me-2" style="padding: 5px; margin: 0px; text-align: center;">You've logged out</div>
					
                <input class="form-control me-2" name="username" type="text" placeholder="Email" aria-label="Search">
                <input class="form-control me-2" name="password" type="password" placeholder="Password" aria-label="Search">
                <button type="submit" name="submit" class="btn btn-success" value="submit">Login</button>
              </form>
            </ul>  
          </div>
        </div>
    </nav>
    <!--End of Navbar-->
    <div th:replace="${content}"></div>
    <br>



    <div class="footer bg-dark justify-content-center align-items-center">
      <br><div>&copy; Contact Manager</div>
      <div> Created with &#10084 by <a style="color: #198754;" href="https://www.HasibChowdhuree.website" target="_blank">&nbsp; Hasib Chowdhuree &nbsp;</a></div>
    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4" crossorigin="anonymous"></script>
    <script th:src="@{/js/script.js}"></script>
    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.min.js" integrity="sha384-Atwg2Pkwv9vp0ygtn1JAojH0nYbwNJLPhwyoVbhoPwBhjQPR5VtM2+xf0Uwh9KtT" crossorigin="anonymous"></script>
    -->
  </body>
</html>
